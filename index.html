    function formatDateTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" }) + " · " + d.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
    }

    function useWindowWidth() {
      const [width, setWidth] = useState(window.innerWidth);
      useEffect(() => {
        const handler = () => setWidth(window.innerWidth);
        window.addEventListener('resize', handler);
        return () => window.removeEventListener('resize', handler);
      }, []);
      return width;
    }

    // ── Sparkline ─────────────────────────────────────────────────────────────
    function Sparkline({ color = C.indigo, width = 80, height = 32 }) {
      const pts = [4,8,5,12,9,14,11,10,16,13,18,15,20,17,19,22,18,24,21,26];
      const max = Math.max(...pts), min = Math.min(...pts);
      const norm = pts.map(p => ((p - min) / (max - min)) * (height - 4) + 2);
      const step = width / (pts.length - 1);
      const d = norm.map((y, i) => `${i === 0 ? "M" : "L"}${i * step},${height - y}`).join(" ");
      return (
        <svg width={width} height={height} style={{ display:"block" }}>
          <path d={d} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" opacity={0.7} />
        </svg>
      );
    }

    // ── Sankey ────────────────────────────────────────────────────────────────
    function SankeyDiagram({ jobs, compact = false, scale: scaleProp }) {
      const scale = scaleProp ?? (compact ? 260 : 360);
      const { statusConfig } = React.useContext(StatusContext);

      const sortedConfig = useMemo(() =>
        [...statusConfig].sort((a, b) => a.stage_order - b.stage_order)
      , [statusConfig]);

      const sourceStatus = sortedConfig[0];

      const statusMap = useMemo(() =>
        Object.fromEntries(statusConfig.map(s => [s.name, s]))
      , [statusConfig]);

      const noAnswerStatus = useMemo(() =>
        statusConfig.find(s => s.protected && s.name !== sourceStatus.name)
      , [statusConfig, sourceStatus]);

      // ── Compute flows ─────────────────────────────────────────────────────
      // "Interview" is a multiplying stage: each occurrence in a job's history
      // becomes a separate virtual node "Interview 1", "Interview 2", etc.
      const { flows, noAnswerCount, inflow } = useMemo(() => {
        const flows = {};
        const inflow = {};
        let noAnswerCount = 0;
        const INTERVIEW = "Interview";
        jobs.forEach(job => {
          const hist = (job.history || []).filter(h => h.status);
          const rawSeq = [];
          hist.forEach(h => { if (!rawSeq.length || rawSeq[rawSeq.length-1] !== h.status) rawSeq.push(h.status); });
          if (job.status && rawSeq[rawSeq.length-1] !== job.status) rawSeq.push(job.status);
          // Expand "Interview" → "Interview 1", "Interview 2", etc.
          let iCount = 0;
          const seq = rawSeq.map(s => s === INTERVIEW ? `Interview ${++iCount}` : s);
          const nonSource = seq.filter(s => s !== sourceStatus.name);
          if (nonSource.length === 0) {
            if (noAnswerStatus) {
              const key = `${sourceStatus.name}|||${noAnswerStatus.name}`;
              flows[key] = (flows[key] || 0) + 1;
              inflow[noAnswerStatus.name] = (inflow[noAnswerStatus.name] || 0) + 1;
            } else { noAnswerCount++; }
          } else {
            for (let i = 0; i < seq.length - 1; i++) {
              if (seq[i] !== seq[i+1]) {
                // Skip edges that originate from a terminal node (they're backward loops)
                const fromType = statusMap[seq[i]]?.type ?? "progress";
                if (fromType !== "terminal") {
                  const key = `${seq[i]}|||${seq[i+1]}`;
                  flows[key] = (flows[key] || 0) + 1;
                  inflow[seq[i+1]] = (inflow[seq[i+1]] || 0) + 1;
                }
              }
            }
          }
        });
        if (noAnswerCount > 0) inflow['__no_answer__'] = noAnswerCount;
        return { flows, noAnswerCount, inflow };
      }, [jobs, sourceStatus, noAnswerStatus, statusMap]);

      if (!jobs.length) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:80,color:C.inkSoft,fontSize:13}}>
          Add applications to see the funnel
        </div>
      );

      const totalJobs = jobs.length;
      const MIN_H     = 20;
      const NODE_W    = 16;
      const PAD_L     = 110, PAD_R = 170, PAD_Y = 44;
      const STEP_X    = 170;  // horizontal step per progress node
      const TERM_GAP  = 14;   // gap between stacked terminal nodes
      const PROG_GAP  = 22;   // gap between stacked progress nodes

      // ── Classify destination nodes ────────────────────────────────────────
      const nonSource    = sortedConfig.filter(s => s.name !== sourceStatus.name);
      const usedNames    = new Set(Object.keys(inflow).filter(k => k !== '__no_answer__'));
      const visibleStats = nonSource.filter(s => usedNames.has(s.name));

      // Virtual "Interview N" nodes — position derived from actual flow predecessors
      // so Interview 2 lands AFTER whatever stage fed into it (e.g. Design Trial)
      const interviewBase      = statusConfig.find(s => s.name === "Interview");
      const interviewBaseOrder = interviewBase?.stage_order ?? 2;

      const interviewKeys = Object.keys(inflow)
        .filter(k => /^Interview \d+$/.test(k))
        .sort((a, b) => parseInt(a.split(" ")[1]) - parseInt(b.split(" ")[1]));

      // For each "Interview N", find the highest stage_order among its direct predecessors
      // in the flows map, then place it just after that.  Process in order so
      // "Interview 2" can reference "Interview 1"'s already-computed position.
      const virtualOrderMap = {};
      interviewKeys.forEach(name => {
        if (name === "Interview 1") { virtualOrderMap[name] = interviewBaseOrder; return; }
        const preds = Object.keys(flows)
          .filter(key => key.endsWith(`|||${name}`))
          .map(key => key.split("|||")[0]);
        let maxPredOrder = interviewBaseOrder;
        preds.forEach(pred => {
          const order = (statusConfig.find(s => s.name === pred)?.stage_order)
                     ?? virtualOrderMap[pred]
                     ?? interviewBaseOrder;
          if (order > maxPredOrder) maxPredOrder = order;
        });
        virtualOrderMap[name] = maxPredOrder + 0.1;
      });

      const virtualInterviewNodes = interviewKeys.map(name => ({
        name,
        dot:         interviewBase?.dot  ?? C.teal,
        bg:          interviewBase?.bg   ?? C.tealLight,
        text:        interviewBase?.text ?? "#145E5A",
        stage_order: virtualOrderMap[name] ?? interviewBaseOrder,
        type:        "progress",
      }));

      // Extended status map — adds virtual interview nodes for colour lookups
      const extStatusMap = {...statusMap, ...Object.fromEntries(virtualInterviewNodes.map(n => [n.name, n]))};

      // progress nodes: replace "Interview" with virtual "Interview N" nodes in staircase
      const progressNodes = [
        ...visibleStats.filter(s => (s.type ?? "progress") === "progress" && s.name !== "Interview"),
        ...virtualInterviewNodes,
      ].sort((a, b) => a.stage_order - b.stage_order || a.name.localeCompare(b.name));

      // terminal nodes except the protected No Answer (handled separately)
      const otherTerminals = visibleStats
        .filter(s => (s.type ?? "progress") === "terminal" && !s.protected)
        .sort((a, b) => a.stage_order - b.stage_order || a.name.localeCompare(b.name));

      const numProgress = progressNodes.length;
      const srcBarX = PAD_L;
      const srcY    = PAD_Y;

      // Terminal column sits one STEP_X beyond the last progress node
      const rightX = srcBarX + NODE_W + (numProgress + 1) * STEP_X;
      const W      = rightX + NODE_W + PAD_R;

      const nodeH = name => {
        if (name === '__no_answer__') return Math.max(MIN_H, Math.round((noAnswerCount / totalJobs) * scale));
        return Math.max(MIN_H, Math.round(((inflow[name] || 0) / totalJobs) * scale));
      };

      // ── Assign (x, y) to every node ──────────────────────────────────────
      const nodeXMap = {};
      const nodeYMap = {};

      // Primary terminal (No Answer / virtual) at top of rightX column
      let termY = srcY;
      const primaryName = noAnswerStatus && (inflow[noAnswerStatus.name] || 0) > 0
        ? noAnswerStatus.name
        : (noAnswerCount > 0 ? '__no_answer__' : null);

      if (primaryName) {
        nodeXMap[primaryName] = rightX;
        nodeYMap[primaryName] = termY;
        termY += nodeH(primaryName) + TERM_GAP;
      }

      // Other terminal nodes stacked below (Rejected, etc.)
      otherTerminals.forEach(s => {
        nodeXMap[s.name] = rightX;
        nodeYMap[s.name] = termY;
        termY += nodeH(s.name) + TERM_GAP;
      });

      // Progress X positions needed by Phase 2 for edge filtering (Y set after Phase 3)
      progressNodes.forEach((s, i) => { nodeXMap[s.name] = srcBarX + NODE_W + (i + 1) * STEP_X; });

      // ── PHASE 2: Build edge list (needs nodeXMap for backward-flow filter) ─
      const allEdges = [];
      if (noAnswerCount > 0) allEdges.push({ from: sourceStatus.name, to: '__no_answer__', count: noAnswerCount });
      Object.entries(flows).forEach(([key, count]) => {
        const [from, to] = key.split('|||');
        if (nodeXMap[to] === undefined) return;
        if (from !== sourceStatus.name && nodeXMap[from] === undefined) return;
        if (from !== sourceStatus.name && (nodeXMap[from] ?? 0) >= (nodeXMap[to] ?? rightX)) return;
        allEdges.push({ from, to, count });
      });

      // First sort: terminals first (by descending X), tiebreak by name
      allEdges.sort((a, b) => {
        const ax = nodeXMap[a.to] ?? rightX, bx = nodeXMap[b.to] ?? rightX;
        return ax !== bx ? bx - ax : a.to.localeCompare(b.to);
      });

      // ── PHASE 3: Pre-compute source band heights (sum = scale exactly) ────
      const srcEdges = allEdges.filter(e => e.from === sourceStatus.name);
      const shMap = {};
      {
        const total = srcEdges.reduce((a, e) => a + e.count, 0) || 1;
        let rem = scale;
        srcEdges.forEach((e, i) => {
          const key = `${e.from}|||${e.to}`;
          if (i === srcEdges.length - 1) { shMap[key] = Math.max(2, rem); }
          else { const h = Math.max(2, Math.round((e.count / total) * scale)); shMap[key] = h; rem -= h; }
        });
      }

      // ── PHASE 4: Y positions for progress nodes (terminal Y already set above) ─
      const terminalSrcH = srcEdges
        .filter(e => (nodeXMap[e.to] ?? 0) === rightX)
        .reduce((a, e) => a + (shMap[`${e.from}|||${e.to}`] ?? 0), 0);
      let progY = srcY + terminalSrcH + 28;
      progressNodes.forEach(s => { nodeYMap[s.name] = progY; progY += nodeH(s.name) + PROG_GAP; });

      // Re-sort now that Y positions exist (same-X destinations ordered by Y)
      allEdges.sort((a, b) => {
        const ax = nodeXMap[a.to] ?? rightX, bx = nodeXMap[b.to] ?? rightX;
        return ax !== bx ? bx - ax : (nodeYMap[a.to] ?? 0) - (nodeYMap[b.to] ?? 0);
      });

      // SVG height
      const H = Math.max(srcY + scale, ...Object.keys(nodeYMap).map(n => nodeYMap[n] + nodeH(n))) + PAD_Y;

      // ── PHASE 5: Pre-compute ALL band heights — exact fills, zero overflow ─
      // Outgoing bands from each intermediate node must sum to nodeH(from)
      const groupByFrom = {};
      allEdges.filter(e => e.from !== sourceStatus.name)
        .forEach(e => { (groupByFrom[e.from] = groupByFrom[e.from] || []).push(e); });
      Object.entries(groupByFrom).forEach(([from, edges]) => {
        const fh = nodeH(from), total = edges.reduce((a, e) => a + e.count, 0) || 1;
        let rem = fh;
        edges.forEach((e, i) => {
          const key = `${e.from}|||${e.to}`;
          if (i === edges.length - 1) { shMap[key] = Math.max(2, rem); }
          else { const h = Math.max(2, Math.round((e.count / total) * fh)); shMap[key] = h; rem -= h; }
        });
      });

      // Incoming bands to each destination must sum to nodeH(to)
      const dhMap = {};
      const groupByTo = {};
      allEdges.forEach(e => { (groupByTo[e.to] = groupByTo[e.to] || []).push(e); });
      Object.entries(groupByTo).forEach(([to, edges]) => {
        const dh = nodeH(to), total = inflow[to] || edges.reduce((a, e) => a + e.count, 0) || 1;
        let rem = dh;
        edges.forEach((e, i) => {
          const key = `${e.from}|||${e.to}`;
          if (i === edges.length - 1) { dhMap[key] = Math.max(2, rem); }
          else { const h = Math.max(2, Math.round((e.count / total) * dh)); dhMap[key] = h; rem -= h; }
        });
      });

      // ── PHASE 6: Draw bands using pre-computed exact heights ──────────────
      const outUsed = {}, inUsed = {};
      let srcBarUsed = 0;

      const bands = allEdges.map(({ from, to }) => {
        const key          = `${from}|||${to}`;
        const fromIsSource = from === sourceStatus.name;
        const x1 = fromIsSource ? srcBarX + NODE_W : (nodeXMap[from] ?? srcBarX) + NODE_W;
        const x2 = nodeXMap[to] ?? rightX;
        const sh = shMap[key] ?? 2;
        const sy1 = fromIsSource ? srcY + srcBarUsed : (nodeYMap[from] ?? srcY) + (outUsed[from] || 0);
        if (fromIsSource) srcBarUsed += sh; else outUsed[from] = (outUsed[from] || 0) + sh;

        const dh  = dhMap[key] ?? 2;
        const dy1 = (nodeYMap[to] ?? srcY) + (inUsed[to] || 0);
        inUsed[to] = (inUsed[to] || 0) + dh;

        const color = to === '__no_answer__' ? (noAnswerStatus?.dot || C.inkSoft) : (extStatusMap[to]?.dot || C.inkSoft);
        const span = x2 - x1, cx1 = x1 + span * 0.55, cx2 = x1 + span * 0.45;

        return (
          <path key={key}
            d={`M${x1},${sy1} C${cx1},${sy1} ${cx2},${dy1} ${x2},${dy1} L${x2},${dy1+dh} C${cx2},${dy1+dh} ${cx1},${sy1+sh} ${x1},${sy1+sh} Z`}
            fill={color} fillOpacity={0.3}
          />
        );
      }).filter(Boolean);

      // ── Render ────────────────────────────────────────────────────────────
      const midY = srcY + scale / 2;

      const NodeLabel = ({ name, x, dot, count, label }) => {
        const y = nodeYMap[name]; if (y === undefined) return null;
        const h = nodeH(name), cy = y + h / 2;
        return (
          <g>
            <rect x={x} y={y} width={NODE_W} height={h} rx={3} fill={dot} fillOpacity={0.85}/>
            <text x={x + NODE_W + 10} y={cy - 5} textAnchor="start" fontSize={12} fill={C.ink} fontWeight="700">{count}</text>
            <text x={x + NODE_W + 10} y={cy + 9} textAnchor="start" fontSize={10} fill={C.inkSoft}>{label}</text>
          </g>
        );
      };

      return (
        <div style={{overflowX:"auto", overflowY:"visible", WebkitOverflowScrolling:"touch"}}>
          <svg width={W} height={H} style={{display:"block", minWidth:W}}>
            {bands}

            {/* Source bar */}
            <rect x={srcBarX} y={srcY} width={NODE_W} height={scale} rx={5} fill={C.inkSoft} fillOpacity={0.4}/>
            <text x={srcBarX - 10} y={midY - 6} textAnchor="end" fontSize={14} fill={C.ink} fontWeight="800">{totalJobs}</text>
            <text x={srcBarX - 10} y={midY + 10} textAnchor="end" fontSize={10} fill={C.inkSoft}>Applications</text>

            {/* Primary terminal (No Answer) — top of right column */}
            {primaryName && (
              <NodeLabel name={primaryName} x={rightX}
                dot={noAnswerStatus?.dot || C.inkSoft}
                count={primaryName === '__no_answer__' ? noAnswerCount : (inflow[primaryName] || 0)}
                label={primaryName === '__no_answer__' ? (noAnswerStatus?.name || 'No Answer') : primaryName}
              />
            )}

            {/* Other terminals (Rejected, etc.) stacked below No Answer */}
            {otherTerminals.map(s => (
              <NodeLabel key={s.name} name={s.name} x={rightX} dot={s.dot}
                count={inflow[s.name] || 0} label={s.name}/>
            ))}

            {/* Progress nodes — diagonal staircase overlapping the No Answer band horizontally */}
            {progressNodes.map(s => (
              <NodeLabel key={s.name} name={s.name} x={nodeXMap[s.name] ?? srcBarX} dot={s.dot}
                count={inflow[s.name] || 0} label={s.name}/>
            ))}
          </svg>
        </div>
      );
    }

    // ── Donut ─────────────────────────────────────────────────────────────────
    function DonutChart({ slices, label, value }) {
      const R=66,CX=86,CY=86,stroke=24,circ=2*Math.PI*R;
      let offset=0;
      const paths = slices.map((s,i) => {
        const dash=(s.pct/100)*circ,gap=circ-dash;
        const el=<circle key={i} cx={CX} cy={CY} r={R} fill="none" stroke={s.color} strokeWidth={stroke} strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-offset} style={{transition:"stroke-dasharray 0.6s ease"}}/>;
        offset+=dash; return el;
      });
      return (
        <svg width={172} height={172} style={{transform:"rotate(-90deg)"}}>
          <circle cx={CX} cy={CY} r={R} fill="none" stroke={C.border} strokeWidth={stroke}/>
          {paths}
          <text x={CX} y={CY-6} textAnchor="middle" fontSize={16} fontWeight="800" fill={C.ink} style={{transform:"rotate(90deg)",transformOrigin:`${CX}px ${CY}px`}}>{value}</text>
          <text x={CX} y={CY+13} textAnchor="middle" fontSize={9} fill={C.inkSoft} style={{transform:"rotate(90deg)",transformOrigin:`${CX}px ${CY}px`}}>{label}</text>
        </svg>
      );
    }

    // ── CV Stats ──────────────────────────────────────────────────────────────
    function CVStatsView({ cvStats }) {
      const [metric,setMetric] = useState("success");
      if (!cvStats.length) return (
        <div className="card" style={{padding:32,textAlign:"center"}}>
          <p style={{color:C.inkSoft,fontSize:13}}>Add applications with CV versions to see stats</p>
        </div>
      );
      const cvPalette = [C.indigo, C.teal, C.orange, "#3DB870", C.lavender, "#F97070", "#5A8ADE", C.pink];
      const slices = cvStats.map((cv,i)=>({name:cv.name,pct:metric==="success"?cv.successRate:cv.offerRate,total:cv.total,color:cvPalette[i%cvPalette.length]}));
      const avgPct = Math.round(slices.reduce((a,s)=>a+s.pct,0)/cvStats.length);
      const totalPct = slices.reduce((a,s)=>a+s.pct,0)||1;
      const normSlices = slices.map(s=>({...s,pct:(s.pct/totalPct)*100}));
      return (
        <div className="card" style={{padding:24}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20}}>
            <div>
              <div style={{fontSize:22,fontWeight:800,color:C.ink,letterSpacing:"-0.03em"}}>CV Performance</div>
              <div style={{fontSize:12,color:C.inkSoft,marginTop:3}}>Compare your CV versions</div>
            </div>
            <div style={{display:"flex",gap:4}}>
              {[["success","Success Rate"],["offer","Offer Rate"]].map(([m,l])=>(
                <button key={m} onClick={()=>setMetric(m)} className={`pill-selector ${metric===m?"pill-selector-active":""}`}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
            <DonutChart slices={normSlices} label={metric==="success"?"avg success":"avg offer"} value={`${avgPct}%`}/>
            <div style={{width:"100%",display:"flex",flexDirection:"column",gap:12}}>
              {slices.map(s=>(
                <div key={s.name} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:9,height:9,borderRadius:"50%",background:s.color,flexShrink:0}}/>
                  <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                      <span style={{fontSize:13,fontWeight:600,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</span>
                      <span style={{fontSize:11,color:C.inkSoft,flexShrink:0}}>{s.total} apps</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      <div className="prog-track" style={{width:72,height:5}}><div className="prog-fill" style={{height:"100%",background:s.color,width:`${s.pct}%`}}/></div>
                      <span style={{fontSize:12,fontWeight:700,width:36,textAlign:"right",color:s.color}}>{s.pct}%</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <p style={{fontSize:11,color:C.inkSoft,textAlign:"center"}}>{metric==="success"?"Success = reached Interview or Offer":"Offer = received a job offer"}</p>
          </div>
        </div>
      );
    }

    // ── Overlays ──────────────────────────────────────────────────────────────
    function TimelineOverlay({ job, onClose, onSave }) {
      const { statuses, statusMeta, stageColors } = React.useContext(StatusContext);
      if (!job) return null;
      const init = job.history && job.history.length ? job.history : [{status:job.status,timestamp:null}];
      const [localHistory, setLocalHistory] = React.useState(init);
      const [editingIdx, setEditingIdx] = React.useState(null);
      const dirty = JSON.stringify(localHistory) !== JSON.stringify(init);

      const setStatus = (i, val) => {
        setLocalHistory(h => h.map((e,idx) => idx===i ? {...e, status:val} : e));
        setEditingIdx(null);
      };
      const deleteEntry = i => {
        setLocalHistory(h => {
          const next = h.filter((_,idx) => idx!==i);
          return next.length ? next : h;
        });
      };
      const handleSave = () => {
        // Re-stamp prevStatus chain after edits
        const rebuilt = localHistory.map((e,i) => {
          if (i===0) { const {prevStatus,...rest} = e; return rest; }
          return {...e, prevStatus: localHistory[i-1].status};
        });
        onSave(job.id, rebuilt);
        onClose();
      };

      return (
        <div style={{position:"fixed",inset:0,background:"rgba(15,15,26,0.35)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}} onClick={onClose}>
          <div className="card" style={{padding:24,width:340,margin:"0 16px",background:"white",maxHeight:"80vh",overflow:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
              <div>
                <div style={{fontWeight:700,color:C.ink,fontSize:15}}>{job.title}</div>
                <div style={{fontSize:11,color:C.inkSoft,marginTop:2}}>{job.company}</div>
              </div>
              <button onClick={onClose} style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:8,width:28,height:28,cursor:"pointer",color:C.inkSoft,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>

            <div style={{position:"relative"}}>
              <div style={{position:"absolute",left:11,top:8,bottom:8,width:2,background:C.border,borderRadius:1}}/>
              <div style={{display:"flex",flexDirection:"column",gap:0}}>
                {localHistory.map((h,i)=>(
                  <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",paddingBottom:16,position:"relative"}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:stageColors[h.status]||C.border,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1,marginTop:1}}>
                      <div style={{width:8,height:8,borderRadius:"50%",background:"white"}}/>
                    </div>
                    <div style={{flex:1}}>
                      {editingIdx===i ? (
                        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:4}}>
                          {statuses.map(s=>(
                            <button key={s} onClick={()=>setStatus(i,s)}
                              style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,cursor:"pointer",
                                border:`1.5px solid ${s===h.status?stageColors[s]||C.border:C.border}`,
                                background:s===h.status?(statusMeta[s]?.bg||C.bg):"white",
                                color:s===h.status?(statusMeta[s]?.text||C.ink):C.inkMid}}>
                              {s}
                            </button>
                          ))}

    // ── Resizable Header ──────────────────────────────────────────────────────
    function ResizableHeader({ label, colKey, widths, onResize }) {
      const dragging=useRef(false), startX=useRef(0), startW=useRef(0);
      const w = widths[colKey];
      const onMouseDown = useCallback(e => {
        e.preventDefault(); dragging.current=true; startX.current=e.clientX; startW.current=w;
        const onMove = e => { if(dragging.current) onResize(colKey, Math.max(60, startW.current+e.clientX-startX.current)); };
        const onUp = () => { dragging.current=false; document.removeEventListener("mousemove",onMove); document.removeEventListener("mouseup",onUp); };
        document.addEventListener("mousemove",onMove); document.addEventListener("mouseup",onUp);
      }, [w,onResize,colKey]);
      const pct = (w/Object.values(widths).reduce((a,b)=>a+b,0))*100;
      return (
        <th style={{width:`${pct}%`,position:"relative",textAlign:"left",fontSize:10,fontWeight:700,color:C.inkSoft,padding:"10px 14px",userSelect:"none",background:C.bg,borderBottom:`2px solid ${C.border}`,letterSpacing:"0.06em",textTransform:"uppercase"}}>
          <span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</span>
          <div onMouseDown={onMouseDown} style={{position:"absolute",top:0,right:0,height:"100%",width:8,cursor:"col-resize",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{width:2,height:12,borderRadius:1,background:C.border}}/>
          </div>
        </th>
      );
    }

    // ── Applications Line Chart ───────────────────────────────────────────────
    function ApplicationsChart({ jobs }) {
      const canvasRef = useRef();
      const chartRef = useRef();

      useEffect(() => {
        const jobsWithDates = jobs.filter(j => j.date).sort((a,b) => new Date(a.date) - new Date(b.date));
        if (!jobsWithDates.length) return;

        const countsByDate = {};
        jobsWithDates.forEach(j => { countsByDate[j.date] = (countsByDate[j.date] || 0) + 1; });

        const dates = Object.keys(countsByDate).sort();
        let cumulative = 0;
        const labels = [];
        const data = [];
        dates.forEach(d => {
          cumulative += countsByDate[d];
          labels.push(new Date(d).toLocaleDateString("en-GB", { day:"numeric", month:"short" }));
          data.push(cumulative);
        });

        if (chartRef.current) chartRef.current.destroy();
        const ctx = canvasRef.current.getContext("2d");
        chartRef.current = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [{
              data,
              borderColor: C.indigo,
              backgroundColor: C.indigoLight + "60",
              fill: true,
              tension: 0.4,
              pointRadius: 3,
              pointHoverRadius: 5,
              pointBackgroundColor: C.white,
              pointBorderColor: C.indigo,
              pointBorderWidth: 2,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                backgroundColor: C.ink,
                titleFont: { family: "Sora", size: 11, weight: "600" },
                bodyFont: { family: "Sora", size: 11 },
                padding: 10,
                callbacks: {
                  label: item => `${item.raw} applications total`,
                }
              }
            },
            scales: {
              x: {
                grid: { display: false },
                border: { display: false },
                ticks: { font: { family: "Sora", size: 9 }, color: C.inkSoft, maxRotation: 0, maxTicksLimit: 6 }
              },
              y: {
                grid: { color: C.border, drawBorder: false },
                border: { display: false },
                ticks: { font: { family: "Sora", size: 9 }, color: C.inkSoft, stepSize: 1 },
                beginAtZero: true,
              }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [jobs]);

      if (!jobs.filter(j => j.date).length) return null;
      return <div style={{height:90, marginTop:16, width:"100%", minWidth:0, overflow:"hidden", position:"relative"}}><canvas ref={canvasRef} /></div>;
    }

    // ── Settings Page ─────────────────────────────────────────────────────────
    function AppearanceSection({ themeName, themeMode, changeTheme, statusConfig, saveStatusConfig }) {
      const [openColorFor, setOpenColorFor] = React.useState(null);
      const [pendingThemeName, setPendingThemeName] = React.useState(themeName);
      const [pendingThemeMode, setPendingThemeMode] = React.useState(themeMode);
      const [pendingStatusConfig, setPendingStatusConfig] = React.useState(statusConfig);

      // Sync if parent changes (e.g. pipeline section saves, renaming stages)
      React.useEffect(() => { setPendingStatusConfig(sc => sc.map(ps => { const s = statusConfig.find(x=>x.name===ps.name); return s?{...ps,dot:s.dot,bg:s.bg,text:s.text}:ps; })); }, [statusConfig]);

      const sourceStatus = [...statusConfig].sort((a,b) => a.stage_order - b.stage_order)[0];
      const nonSource = pendingStatusConfig.filter(s => s.name !== sourceStatus?.name);

      const themeChanged = pendingThemeName !== themeName || pendingThemeMode !== themeMode;
      const colorsChanged = pendingStatusConfig.some(ps => {
        const orig = statusConfig.find(s => s.name === ps.name);
        return orig && (orig.dot !== ps.dot || orig.bg !== ps.bg || orig.text !== ps.text);
      });
      const isDirty = themeChanged || colorsChanged;

      const handleSave = () => {
        if (themeChanged) changeTheme(pendingThemeName, pendingThemeMode);
        if (colorsChanged) {
          const merged = statusConfig.map(s => {
            const p = pendingStatusConfig.find(ps => ps.name === s.name);
            return p ? {...s, dot:p.dot, bg:p.bg, text:p.text} : s;
          });
          saveStatusConfig(merged);
        }
      };

      const PRESETS = [
        { name:"default", label:"Default", colors:["#6B6BD4","#4ECDC4","#F0B8D8","#C8B8F8","#FF8C42"] },
        { name:"ocean",   label:"Ocean",   colors:["#0EA5E9","#06B6D4","#818CF8","#A5B4FC","#F97316"] },
        { name:"forest",  label:"Forest",  colors:["#16A34A","#65A30D","#34D399","#6EE7B7","#F59E0B"] },
        { name:"sunset",  label:"Sunset",  colors:["#F97316","#EC4899","#EF4444","#F0B8D8","#FCA5A5"] },
      ];
      return (
        <div>
          {/* Mode toggle */}
          <div style={{marginBottom:28}}>
            <div style={{fontSize:12,fontWeight:700,color:C.inkSoft,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Mode</div>
            <div style={{display:"inline-flex",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:3,gap:2}}>
              {[["light","☀ Light"],["dark","◐ Dark"],["system","⊙ System"]].map(([val,lbl]) => (
                <button key={val} onClick={()=>setPendingThemeMode(val)}
                  style={{padding:"7px 18px",borderRadius:9,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
                    background:pendingThemeMode===val?C.white:"transparent",color:pendingThemeMode===val?C.ink:C.inkSoft,
                    boxShadow:pendingThemeMode===val?"0 1px 4px rgba(15,15,26,0.10)":"none",transition:"all 0.15s",fontFamily:"inherit"}}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>
          {/* Preset themes */}
          <div style={{marginBottom:28}}>
            <div style={{fontSize:12,fontWeight:700,color:C.inkSoft,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Colour Theme</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,maxWidth:400}}>
              {PRESETS.map(p => (
                <button key={p.name} onClick={()=>setPendingThemeName(p.name)}
                  style={{background:C.white,border:`2px solid ${pendingThemeName===p.name?C.indigo:C.border}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",textAlign:"left",position:"relative",transition:"border-color 0.15s"}}>
                  <div style={{display:"flex",gap:5,marginBottom:8}}>
                    {p.colors.map((col,i) => <div key={i} style={{width:16,height:16,borderRadius:"50%",background:col}}/>)}
                  </div>
                  <div style={{fontSize:12,fontWeight:600,color:C.ink}}>{p.label}</div>
                  {pendingThemeName===p.name && (
                    <div style={{position:"absolute",top:8,right:8,width:18,height:18,borderRadius:"50%",background:C.indigo,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"white",fontWeight:800}}>✓</div>
                  )}
                </button>
              ))}
            </div>
          </div>
          {/* Tag colours */}
          {nonSource.length > 0 && (
            <div style={{marginBottom:28}}>
              <div style={{fontSize:12,fontWeight:700,color:C.inkSoft,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Tag Colours</div>
              <div className="card" style={{padding:"4px 0"}}>
                {nonSource.map((s,i) => (
                  <div key={s.name} style={{padding:"10px 16px",borderBottom:i<nonSource.length-1?`1px solid ${C.border}`:"none",display:"flex",alignItems:"center",gap:10,position:"relative"}}>

                    <span style={{flex:1,fontSize:13,fontWeight:600,color:C.ink}}>{s.name}</span>
                    {s.protected && <span style={{fontSize:10,color:C.inkSoft,fontStyle:"italic"}}>system</span>}
                    <button onClick={()=>setOpenColorFor(openColorFor===s.name?null:s.name)}
                      style={{padding:"4px 10px",borderRadius:8,border:`1.5px solid ${openColorFor===s.name?C.indigo:C.border}`,background:openColorFor===s.name?C.indigoLight:C.white,cursor:"pointer",fontSize:11,fontWeight:600,color:openColorFor===s.name?C.indigo:C.inkMid,fontFamily:"inherit",transition:"all 0.15s"}}>
                      Color

                      <div style={{position:"absolute",right:16,top:"100%",background:C.white,border:`1.5px solid ${C.border}`,borderRadius:10,padding:10,display:"flex",gap:6,flexWrap:"wrap",zIndex:100,boxShadow:"0 4px 16px rgba(15,15,26,0.12)",width:176}}>

                          <button key={p.label} onClick={()=>{
                            setPendingStatusConfig(pendingStatusConfig.map(x=>x.name===s.name?{...x,dot:p.dot,bg:p.bg,text:p.text}:x));
                            setOpenColorFor(null);
                          }} title={p.label}
                            style={{width:24,height:24,borderRadius:"50%",background:p.dot,border:`2.5px solid ${p.dot===s.dot?C.ink:"transparent"}`,cursor:"pointer",padding:0}}/>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Save button */}
          <button onClick={isDirty?handleSave:undefined} disabled={!isDirty}
            style={{padding:"9px 28px",borderRadius:10,border:"none",cursor:isDirty?"pointer":"default",fontSize:13,fontWeight:700,fontFamily:"inherit",
              background:isDirty?C.indigo:C.border,color:isDirty?"white":C.inkSoft,transition:"background 0.2s,color 0.2s"}}>
            {isDirty?"Save":"Saved"}
          </button>
        </div>
      );
    }

    function PipelineSection({ statusConfig, saveStatusConfig }) {
      const [local, setLocal] = React.useState(statusConfig);
      const [adding, setAdding] = React.useState(false);
      const [addName, setAddName] = React.useState("");
      const [addPreset, setAddPreset] = React.useState(COLOR_PRESETS[2]);
      const [editingColor, setEditingColor] = React.useState(null);
      const [limitError, setLimitError] = React.useState("");
      const [dragIdx, setDragIdx] = React.useState(null);
      const [dragOverIdx, setDragOverIdx] = React.useState(null);
      const [pendingRenames, setPendingRenames] = React.useState({});
      const localRef = React.useRef(local);
      localRef.current = local;

      React.useEffect(() => { setLocal(statusConfig); setPendingRenames({}); }, [statusConfig]);

      const isDirty = JSON.stringify(local) !== JSON.stringify(statusConfig);

      const sourceStatus = [...local].sort((a,b) => a.stage_order - b.stage_order)[0];
      const nonApplied = local.filter(s => s.name !== sourceStatus?.name);

      // commit only updates local state — changes are not saved until Save is clicked
      const commit = updated => setLocal(updated);

      const updateName = (i, name) => {
        const target = nonApplied[i];
        setLocal(local.map(s => s === target ? {...s, name} : s));
      };
      const blurName = () => {
        // Detect any renames by comparing local state vs saved statusConfig (matched by stage_order)
        const origByOrder = Object.fromEntries(statusConfig.map(s => [s.stage_order, s.name]));
        const newRenames = {};
        localRef.current.forEach(s => {
          const orig = origByOrder[s.stage_order];
          if (orig !== undefined && orig !== s.name) newRenames[orig] = s.name;
        });
        setPendingRenames(r => ({ ...r, ...newRenames }));
        setLocal(localRef.current);
      };

      const toggleType = i => {
        const target = nonApplied[i];
        commit(local.map(s => s === target ? {...s, type:s.type==="progress"?"terminal":"progress"} : s));
      };

      const updateColor = (i, preset) => {
        const target = nonApplied[i];
        setEditingColor(null);
        commit(local.map(s => s === target ? {...s, dot:preset.dot, bg:preset.bg, text:preset.text} : s));
      };

      const remove = i => {
        if (local.length <= 3) { setLimitError("Minimum of 3 stages required."); return; }
        setLimitError("");
        commit(local.filter(s => s !== nonApplied[i]));
      };

      const addStage = () => {
        if (!addName.trim()) return;
        if (local.length >= 8) { setLimitError("Maximum of 8 stages reached."); setAdding(false); return; }
        setLimitError("");
        const maxOrder = local.reduce((m,s) => Math.max(m, s.stage_order ?? 0), 0);
        commit([...local, {name:addName.trim(), dot:addPreset.dot, bg:addPreset.bg, text:addPreset.text, stage_order:maxOrder+1, type:"progress"}]);
        setAddName(""); setAdding(false);
      };

      const handleDragStart = (e,i) => { setDragIdx(i); e.dataTransfer.effectAllowed="move"; };
      const handleDragOver  = (e,i) => { e.preventDefault(); e.dataTransfer.dropEffect="move"; setDragOverIdx(i); };
      const handleDrop = (e, dropIdx) => {
        e.preventDefault();
        if (dragIdx===null || dragIdx===dropIdx) { setDragIdx(null); setDragOverIdx(null); return; }
        const next = [...nonApplied];
        const [moved] = next.splice(dragIdx, 1);
        next.splice(dropIdx, 0, moved);
        const source = local.find(s => s.name === sourceStatus?.name);
        const pinned = next.filter(s => s.protected).sort((a,b) => a.stage_order - b.stage_order);
        const draggable = next.filter(s => !s.protected);
        let order = 2;
        commit([...(source?[source]:[]), ...pinned, ...draggable.map(s=>({...s,stage_order:order++}))]);
        setDragIdx(null); setDragOverIdx(null);
      };
      const handleDragEnd = () => { setDragIdx(null); setDragOverIdx(null); };

      const canAdd = local.length < 8;

      return (
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:12,color:C.inkSoft}}>{local.length} of 8 stages used</div>
          </div>
          <div style={{background:C.indigoLight,borderRadius:10,padding:"9px 14px",marginBottom:14,fontSize:12,color:C.inkMid,lineHeight:1.5}}>
            <strong style={{color:C.ink}}>Applied</strong> is the source stage — all applications start here. Its settings are fixed.
          </div>
          {limitError && (
            <div style={{background:"#FFF5F5",border:"1.5px solid #DC2626",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12,color:"#7F1D1D",lineHeight:1.5}}>{limitError}</div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
            {nonApplied.map((s,i) => (
              <div key={s.name+i}
                draggable={!s.protected}
                onDragStart={!s.protected ? e=>handleDragStart(e,i) : undefined}
                onDragOver={e=>handleDragOver(e,i)}
                onDrop={e=>handleDrop(e,i)}
                onDragEnd={handleDragEnd}
                style={{background:dragOverIdx===i&&dragIdx!==i?C.indigoLight:C.white,borderRadius:10,padding:"10px 12px",
                  border:`1.5px solid ${dragOverIdx===i&&dragIdx!==i?C.indigo:C.border}`,opacity:dragIdx===i?0.4:1,
                  transition:"border-color 0.12s,background 0.12s",position:"relative"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {s.protected
                    ? <span style={{fontSize:12,color:C.inkSoft,width:16,textAlign:"center",userSelect:"none",flexShrink:0}}>🔒</span>
                    : <span draggable={false} style={{cursor:"grab",fontSize:15,color:C.inkSoft,width:16,textAlign:"center",userSelect:"none",lineHeight:1,flexShrink:0}} title="Drag to reorder">⠿</span>
                  }
                  <button onClick={()=>setEditingColor(editingColor===i?null:i)}
                    style={{width:14,height:14,borderRadius:"50%",background:s.dot,border:`2px solid ${editingColor===i?C.ink:"transparent"}`,flexShrink:0,cursor:"pointer",padding:0,transition:"border-color 0.12s"}}/>
                  {s.protected
                    ? <span style={{flex:1,fontSize:13,fontWeight:600,color:C.inkMid}}>{s.name}</span>
                    : <input value={s.name} onChange={e=>updateName(i,e.target.value)} onBlur={blurName}
                        style={{flex:1,border:"none",background:"transparent",fontSize:13,fontWeight:600,color:C.ink,outline:"none",fontFamily:"inherit",minWidth:0}}/>
                  }
                  <button onClick={s.protected?undefined:()=>toggleType(i)} disabled={s.protected}
                    style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,border:"none",cursor:s.protected?"default":"pointer",fontFamily:"inherit",
                      color:s.type==="terminal"?"#7F1D1D":"#145E5A",background:s.type==="terminal"?"#FFE0E0":"#D0F5F3",
                      opacity:s.protected?0.7:1,flexShrink:0}}>
                    {s.type==="terminal"?"Terminal":"Progress"}
                  </button>
                  {s.protected
                    ? <span style={{fontSize:10,color:C.inkSoft,fontStyle:"italic",flexShrink:0}}>system</span>
                    : <button onClick={()=>remove(i)} title="Remove stage"
                        style={{background:"transparent",border:"none",cursor:"pointer",color:"#DC2626",fontSize:14,lineHeight:1,padding:"2px 4px",flexShrink:0}}>✕</button>
                  }
                </div>
                {editingColor===i && (
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8,paddingLeft:24}}>
                    {COLOR_PRESETS.map(p => (
                      <button key={p.label} onClick={()=>updateColor(i,p)} title={p.label}
                        style={{width:20,height:20,borderRadius:"50%",background:p.dot,border:`2.5px solid ${p.dot===s.dot?C.ink:"transparent"}`,cursor:"pointer",padding:0}}/>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
          {adding ? (
            <div style={{background:C.bg,borderRadius:10,padding:"10px 12px",border:`1.5px solid ${C.border}`,marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                <div style={{width:12,height:12,borderRadius:"50%",background:addPreset.dot,flexShrink:0}}/>
                <input autoFocus placeholder="Stage name…" value={addName} onChange={e=>setAddName(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addStage()}
                  style={{flex:1,border:"none",background:"transparent",fontSize:13,fontWeight:600,color:C.ink,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                {COLOR_PRESETS.map(p=>(
                  <button key={p.label} onClick={()=>setAddPreset(p)} title={p.label}
                    style={{width:20,height:20,borderRadius:"50%",background:p.dot,border:`2.5px solid ${p.dot===addPreset.dot?C.ink:"transparent"}`,cursor:"pointer",padding:0}}/>
                ))}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={addStage} style={{flex:1,padding:"7px 0",borderRadius:8,background:C.indigo,color:"white",border:"none",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"inherit"}}>Add</button>
                <button onClick={()=>{setAdding(false);setAddName("");}} style={{flex:1,padding:"7px 0",borderRadius:8,background:C.white,color:C.inkMid,border:`1.5px solid ${C.border}`,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>Cancel</button>
              </div>
            </div>
          ) : (
            <button onClick={()=>{if(canAdd){setLimitError("");setAdding(true);}else setLimitError("Maximum of 8 stages reached. Delete a stage first.");}}
              style={{width:"100%",padding:"9px 0",borderRadius:10,background:C.white,border:`1.5px dashed ${canAdd?C.border:"#DC2626"}`,cursor:canAdd?"pointer":"default",fontSize:12,fontWeight:600,color:canAdd?C.inkMid:"#DC2626",marginBottom:4,fontFamily:"inherit"}}>
              {canAdd ? `+ Add Stage  (${local.length}/8)` : "Max 8 stages reached"}
            </button>
          )}
          <p style={{fontSize:11,color:C.inkSoft,marginTop:10,lineHeight:1.5}}>
            Drag ⠿ to reorder · Click type badge to toggle Progress / Terminal · 🔒 system stages are fixed
          </p>
          <div style={{marginTop:16}}>
            <button onClick={isDirty?()=>{saveStatusConfig(local,pendingRenames);setPendingRenames({});}:undefined} disabled={!isDirty}
              style={{padding:"9px 28px",borderRadius:10,border:"none",cursor:isDirty?"pointer":"default",fontSize:13,fontWeight:700,fontFamily:"inherit",
                background:isDirty?C.indigo:C.border,color:isDirty?"white":C.inkSoft,transition:"background 0.2s,color 0.2s"}}>
              {isDirty?"Save":"Saved"}
            </button>
          </div>
        </div>
      );
    }

    function SupportSection({ supportForm, setSupportForm, supportSubmitted, setSupportSubmitted, supportDirty, setSupportDirty }) {
      const [errors, setErrors] = React.useState({});

      const update = (key, val) => {
        setSupportForm(f => ({...f, [key]: val}));
        setSupportDirty(true);
        if (errors[key]) setErrors(e => ({...e, [key]: null}));
      };

      const validate = () => {
        const e = {};
        if (!supportForm.subject.trim()) e.subject = "Subject is required.";
        if (supportForm.message.trim().length < 20) e.message = "Message must be at least 20 characters.";
        if (supportForm.email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(supportForm.email)) e.email = "Please enter a valid email address.";
        return e;
      };

      const submit = () => {
        const e = validate();
        if (Object.keys(e).length) { setErrors(e); return; }
        console.log("Support submission:", supportForm);
        setSupportSubmitted(true);
        setSupportDirty(false);
      };

      if (supportSubmitted) return (
        <div className="card" style={{padding:32,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>✅</div>
          <div style={{fontWeight:800,fontSize:17,color:C.ink,marginBottom:8}}>Thanks for reaching out!</div>
          <p style={{fontSize:13,color:C.inkSoft,lineHeight:1.6,margin:"0 0 20px"}}>We'll get back to you within 2 business days.</p>
          <button onClick={()=>{setSupportSubmitted(false);setSupportForm({category:"Bug Report",subject:"",message:"",email:""}); setSupportDirty(false);}}
            className="btn-outline" style={{borderRadius:10,padding:"9px 20px",fontSize:13}}>Send another message</button>
        </div>
      );

      const field = (label, key, type="text", hint=null) => (
        <div>
          <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</label>
          <input type={type} value={supportForm[key]} onChange={e=>update(key,e.target.value)} className="app-input"
            style={{borderColor:errors[key]?"#DC2626":undefined}}/>
          {hint && !errors[key] && <p style={{fontSize:11,color:C.inkSoft,margin:"4px 0 0"}}>{hint}</p>}
          {errors[key] && <p style={{fontSize:11,color:"#DC2626",margin:"4px 0 0"}}>{errors[key]}</p>}
        </div>
      );

      return (
        <div style={{display:"flex",flexDirection:"column",gap:16,maxWidth:480}}>
          <div>
            <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Category</label>
            <select value={supportForm.category} onChange={e=>update("category",e.target.value)} className="app-input">
              {["Bug Report","Feature Request","General Enquiry"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          {field("Subject","subject")}
          <div>
            <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Message</label>
            <textarea value={supportForm.message} onChange={e=>update("message",e.target.value)} className="app-input"
              placeholder="Describe your issue or idea…" style={{height:110,resize:"none",display:"block",lineHeight:1.6,borderColor:errors.message?"#DC2626":undefined}}/>
            {!errors.message && <p style={{fontSize:11,color:C.inkSoft,margin:"4px 0 0"}}>{Math.max(0,20-supportForm.message.trim().length)} characters still needed</p>}
            {errors.message && <p style={{fontSize:11,color:"#DC2626",margin:"4px 0 0"}}>{errors.message}</p>}
          </div>
          {field("Email (optional)","email","email")}
          <button onClick={submit} className="btn-cta" style={{borderRadius:10,padding:"10px 0",width:"100%",fontSize:13,marginTop:4}}>Send Message</button>
        </div>
      );
    }
