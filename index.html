                <button key={s.id} onClick={()=>setSettingsSection(s.id)}
                  style={{display:"flex",alignItems:"center",gap:8,padding:isMobile?"9px 14px":"10px 12px",
                    borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",
                    fontSize:13,fontWeight:settingsSection===s.id?700:500,textAlign:"left",flexShrink:0,
                    background:settingsSection===s.id?C.indigoLight:"transparent",
                    color:settingsSection===s.id?C.ink:C.inkSoft,transition:"background 0.12s,color 0.12s"}}>
                  <span style={{fontSize:14}}>{s.icon}</span>{s.label}
                </button>
              ))}
            </div>
            {/* Content area */}
            <div style={{flex:1,paddingLeft:isMobile?0:28,minWidth:0,paddingTop:isMobile?8:0}}>
              {settingsSection==="appearance" && (
                <AppearanceSection themeName={themeName} themeMode={themeMode} changeTheme={changeTheme}
                  statusConfig={statusConfig} saveStatusConfig={saveStatusConfig}/>
              )}
              {settingsSection==="pipeline" && (
                <PipelineSection statusConfig={statusConfig} saveStatusConfig={saveStatusConfig}/>
              )}
              {settingsSection==="data" && (
                <DataSection jobs={jobs} onExportCSV={onExportCSV} onExportExcel={onExportExcel} onCSVFile={onCSVFile}
                  importPreview={importPreview} setImportPreview={setImportPreview}
                  importMode={importMode} setImportMode={setImportMode}
                  importReplaceText={importReplaceText} setImportReplaceText={setImportReplaceText}
                  onConfirmImport={onConfirmImport} resetText={resetText} setResetText={setResetText} onReset={onReset}/>
              )}
              {settingsSection==="support" && (
                <SupportSection supportForm={supportForm} setSupportForm={setSupportForm}
                  supportSubmitted={supportSubmitted} setSupportSubmitted={setSupportSubmitted}
                  supportDirty={supportDirty} setSupportDirty={setSupportDirty}/>
              )}
            </div>
          </div>
        </div>
      );
    }


    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [jobs,setJobs] = useState([]);
      const [view,setView] = useState("dashboard");
      const [form,setForm] = useState(EMPTY_FORM);
      const [aiText,setAiText] = useState("");
      const [aiLoading,setAiLoading] = useState(false);
      const [apiKey,setApiKey] = useState("");
      const [addMode,setAddMode] = useState("manual");
      const [editId,setEditId] = useState(null);
      const [noteJob,setNoteJob] = useState(null);
      const [timelineJob,setTimelineJob] = useState(null);
      const [ctxMenu,setCtxMenu] = useState(null);
      const [colWidths,setColWidths] = useState(DEFAULT_COL_WIDTHS);
      const [searchQuery,setSearchQuery] = useState("");
      const [showFilters,setShowFilters] = useState(false);
      const [selectedStatuses,setSelectedStatuses] = useState([]);
      const [sortOrder,setSortOrder] = useState("none");
      const [cardFilter,setCardFilter] = useState("All");
      const [successFilter,setSuccessFilter] = useState("All time");
      const [activityView,setActivityView] = useState("activity");
      const [statusConfig,setStatusConfig] = useState(DEFAULT_STATUS_CONFIG);
      const [orphanAlert,setOrphanAlert] = useState(null);
      const [themeName,setThemeName] = useState("default");
      const [themeMode,setThemeMode] = useState("light");
      const [themeVersion,setThemeVersion] = useState(0);
      const [settingsSection,setSettingsSection] = useState("appearance");
      const [importPreview,setImportPreview] = useState(null);
      const [importMode,setImportMode] = useState(null);
      const [importReplaceText,setImportReplaceText] = useState("");
      const [resetText,setResetText] = useState("");
      const [supportForm,setSupportForm] = useState({category:"Bug Report",subject:"",message:"",email:""});
      const [supportSubmitted,setSupportSubmitted] = useState(false);
      const [supportDirty,setSupportDirty] = useState(false);

      const styles = useMemo(makeStyles, [themeVersion]);

      const windowWidth = useWindowWidth();
      const isMobile = windowWidth < 768;
      const isTablet = windowWidth < 1024;

      useEffect(() => {
        try {
          // ── Job status migration ───────────────────────────────────────────
          const STATUS_RENAMES = { "Interviewing":"Interview", "Screening Call":"Interview", "Ghosted":"No Answer" };
          const r = localStorage.getItem("jobs");
          if (r) {
            let loadedJobs = JSON.parse(r);
            let jobsDirty = false;
            loadedJobs = loadedJobs.map(j => {
              const ns = STATUS_RENAMES[j.status] || j.status;
              const nh = (j.history||[]).map(h => ({...h, status: STATUS_RENAMES[h.status]||h.status}));
              if (ns !== j.status || JSON.stringify(nh) !== JSON.stringify(j.history||[])) jobsDirty = true;
              return {...j, status:ns, history:nh};
            });
            setJobs(loadedJobs);
            if (jobsDirty) localStorage.setItem("jobs", JSON.stringify(loadedJobs));
          } else {
            setJobs(SEED_JOBS);
            localStorage.setItem("jobs", JSON.stringify(SEED_JOBS));
          }

          const c = localStorage.getItem("colWidths"); if(c) setColWidths(JSON.parse(c));
          const k = localStorage.getItem("apiKey"); if(k) setApiKey(k);

          // ── Status config migration ────────────────────────────────────────
          const sc = localStorage.getItem("statusConfig");
          if (sc) {
            const parsed = JSON.parse(sc);
            let migrated = parsed.map(s => {
              const def = DEFAULT_STATUS_CONFIG.find(d => d.name === s.name);
              return {
                ...s,
                stage_order: s.stage_order ?? (def?.stage_order ?? 1),
                // Force protected flag from defaults so newly-locked stages (e.g. Interview) get locked retroactively
                protected:   def?.protected ?? s.protected ?? false,
                type:        s.type ?? (def?.type ?? "progress"),
              };
            });
            if (!migrated.find(s => s.name === "No Answer")) {
              const noAnswer = DEFAULT_STATUS_CONFIG.find(s => s.name === "No Answer");
              if (noAnswer) migrated.splice(1, 0, noAnswer);
            }
            setStatusConfig(migrated);
          }

          // ── Theme load ────────────────────────────────────────────────────
          const savedTheme = localStorage.getItem("appTheme") || "default";
          const savedMode  = localStorage.getItem("appThemeMode") || "light";
          setThemeName(savedTheme);
          setThemeMode(savedMode);
          // applyTheme already ran at module level with same values; only increment
          // themeVersion if they differ from defaults (so styles recompute with dark/non-default theme).
          if (savedTheme !== "default" || savedMode !== "light") {
            applyTheme(savedTheme, savedMode);
            setThemeVersion(v => v + 1);
          }
        } catch {}
      }, []);

      // Keep body background in sync whenever theme changes
      useEffect(() => {
        document.body.style.background = C.bg;
        document.documentElement.style.background = C.bg;
      }, [themeVersion]);

      const saveStatusConfig = (config, renameMap = {}) => {
        const newNames = new Set(config.map(s => s.name));
        // Jobs whose status is being renamed are not orphans — exclude them from the alert
        const orphans = jobs.filter(j => !newNames.has(j.status) && !renameMap[j.status]);
        if (Object.keys(renameMap).length > 0) {
          save(jobs.map(j => ({
            ...j,
            status: renameMap[j.status] ?? j.status,
            history: (j.history || []).map(h => ({
              ...h,
              ...(h.status ? { status: renameMap[h.status] ?? h.status } : {})
            }))
          })));
        }
        setStatusConfig(config);
        localStorage.setItem("statusConfig", JSON.stringify(config));
        if (orphans.length) setOrphanAlert(orphans);
      };

      const ctxStatuses   = useMemo(() => statusConfig.map(s => s.name), [statusConfig]);
      const ctxStatusMeta = useMemo(() => Object.fromEntries(statusConfig.map(s => [s.name, { bg:s.bg, text:s.text, dot:s.dot }])), [statusConfig]);
      const ctxStageColors= useMemo(() => Object.fromEntries(statusConfig.map(s => [s.name, s.dot])), [statusConfig]);

      const save = u => { setJobs(u); localStorage.setItem("jobs", JSON.stringify(u)); };

      const updateStatus = (id, newStatus) => {
        save(jobs.map(j => {
          if (j.id!==id) return j;
          const history = j.history||[{status:j.status,timestamp:new Date().toISOString()}];
          const last = history.filter(h=>h.status).slice(-1)[0] || history[history.length-1];
          if (last.status===newStatus) return {...j,status:newStatus};
          return {...j,status:newStatus,history:[...history,{status:newStatus,prevStatus:last.status,timestamp:new Date().toISOString()}]};
        }));
      };

      const setCol = (key, w) => {
        const diff = w-colWidths[key], otherKeys=Object.keys(colWidths).filter(k=>k!==key);
        const otherTotal = otherKeys.reduce((a,k)=>a+colWidths[k],0);
        const updated = {...colWidths,[key]:w};
        otherKeys.forEach(k=>{updated[k]=Math.max(60,colWidths[k]-diff*(colWidths[k]/otherTotal));});
        setColWidths(updated); localStorage.setItem("colWidths",JSON.stringify(updated));
      };

      const resetAllData = () => {
        if (resetText !== "DELETE") return;
        save([]); setResetText(""); setView("dashboard");
      };

      const exportCSV = () => {
        const HEADERS = ["title","company","status","date","cv","notes","url"];
        const esc = v => `"${String(v ?? "").replace(/"/g,'""')}"`;
        const rows = [HEADERS, ...jobs.map(j => HEADERS.map(h => esc(j[h])))];
        const csv = rows.map(r => r.join(",")).join("\n");
        const a = Object.assign(document.createElement("a"), {
          href: URL.createObjectURL(new Blob([csv], {type:"text/csv"})),
          download: `jobtrackerfordummies_export_${new Date().toISOString().slice(0,10)}.csv`
        });
        a.click(); URL.revokeObjectURL(a.href);
      };

      const handleCSVFile = e => {
        const file = e.target.files[0]; if (!file) return;
        e.target.value = "";
        const EXPECTED = ["title","company","status","date","cv","notes","url"];
        const reader = new FileReader();
        reader.onload = ev => {
          const lines = ev.target.result.trim().split("\n");
          const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g,"").trim());
          if (!EXPECTED.every((h,i) => h === headers[i])) {
            setImportPreview({ error: "This file doesn't match the expected format. Please use a CSV exported from Job Tracker for Dummies." });
            return;
          }
          const rows = lines.slice(1).map(l => {
            const vals = []; let cur = "", inQ = false;
            for (const ch of l) {
              if (ch === '"') { inQ = !inQ; } else if (ch === ',' && !inQ) { vals.push(cur); cur = ""; } else cur += ch;
            }
            vals.push(cur);
            return Object.fromEntries(EXPECTED.map((h,i) => [h, vals[i]?.replace(/^"|"$/g,"") ?? ""]));
          });
          setImportPreview({ rows, count: rows.length });
          setImportMode(null); setImportReplaceText("");
        };
        reader.readAsText(file);
      };

      const confirmImport = () => {
        if (!importPreview?.rows) return;
        const newJobs = importPreview.rows.map(r => ({...r, id: Date.now().toString() + Math.random().toString(36).slice(2)}));
        if (importMode === "replace") {
          save(newJobs);
        } else {
          save([...jobs, ...newJobs]);
        }
        setImportPreview(null); setImportMode(null); setImportReplaceText("");
      };

      const changeTheme = (name, mode) => {
        applyTheme(name, mode);
        setThemeName(name);
        setThemeMode(mode);
        setThemeVersion(v => v + 1);
        localStorage.setItem("appTheme", name);
        localStorage.setItem("appThemeMode", mode);
      };

      const stats = {
        total: jobs.length,
        interviewing: jobs.filter(j=>j.status==="Interview").length,
        offers: jobs.filter(j=>j.status==="Offer").length,
        successRate: jobs.length?Math.round((jobs.filter(j=>["Interview","Offer"].includes(j.status)).length/jobs.length)*100):0,
        active: jobs.filter(j=>!["Rejected","No Answer"].includes(j.status)).length,
      };

      const cvStatsData = () => {
        const cvs = {};
        jobs.forEach(j => {
          if (!j.cv) return;
          if (!cvs[j.cv]) cvs[j.cv]={total:0,interviews:0,offers:0};
          cvs[j.cv].total++;
          if (["Interview","Offer"].includes(j.status)) cvs[j.cv].interviews++;
          if (j.status==="Offer") cvs[j.cv].offers++;
        });
        return Object.entries(cvs).map(([name,d])=>({name,total:d.total,successRate:d.total?Math.round((d.interviews/d.total)*100):0,offerRate:d.total?Math.round((d.offers/d.total)*100):0}));
      };

      const handleAiAutoFill = async () => {
        if (!aiText.trim()) return;
        if (!apiKey.trim()) return alert("Please enter your Anthropic API key first.");
        setAiLoading(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{
              "Content-Type":"application/json",
              "x-api-key": apiKey,
              "anthropic-version":"2023-06-01",
              "anthropic-dangerous-direct-browser-access":"true",
            },
            body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1000,messages:[{role:"user",content:`Extract job application details from the following text and return ONLY a JSON object with these fields: title, company, date (YYYY-MM-DD format, today if not found), cv (empty string), notes, url (empty string if not found). Text:\n\n${aiText}`}]})
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const parsed = JSON.parse(data.content.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim());
          setForm({...EMPTY_FORM,...parsed,status:"Applied"}); setAddMode("manual");
        } catch(e) { alert("Could not parse. " + (e.message||"Check your API key or try again.")); }
        setAiLoading(false);
      };

      const submitForm = () => {
        if (!form.title||!form.company) return alert("Title and company are required.");
        if (editId) {
          save(jobs.map(j => {
            if (j.id!==editId) return j;
            const history = [...(j.history||[])];
            const lastStatus = history.filter(h=>h.status).slice(-1)[0]?.status || j.status;
            if (form.status !== j.status)
              history.push({status:form.status, prevStatus:lastStatus, timestamp:new Date().toISOString()});
            if (form.notes && form.notes !== j.notes)
              history.push({type:"note", timestamp:new Date().toISOString()});
            return {...j,...form,id:editId,history};
          }));
          setEditId(null);
        } else {
          save([...jobs,{...form,id:Date.now().toString(),history:[{status:form.status,timestamp:new Date().toISOString()}]}]);
        }
        setForm(EMPTY_FORM); setAiText(""); setView("list");
      };

      const deleteJob = id => save(jobs.filter(j=>j.id!==id));

      const exportToExcel = () => {
        const rows = jobs.map(j => ({
          "Position":    j.title,
          "Company":     j.company,
          "Status":      j.status,
          "Date":        j.date || "",
          "CV Version":  j.cv || "",
          "Notes":       j.notes || "",
        }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Applications");
        XLSX.writeFile(wb, "job-tracker.xlsx");
      };
      const startEdit = job => { setForm(job); setEditId(job.id); setAddMode("manual"); setView("add"); };
      const toggleStatus = s => setSelectedStatuses(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
      const resetFilters = () => { setSelectedStatuses([]); setSortOrder("none"); };
      const activeFilterCount = selectedStatuses.length+(sortOrder!=="none"?1:0);

      const filtered = useMemo(() => {
        let res = selectedStatuses.length>0?jobs.filter(j=>selectedStatuses.includes(j.status)):[...jobs];
        if (searchQuery.trim()) { const q=searchQuery.toLowerCase(); res=res.filter(j=>j.title.toLowerCase().includes(q)||j.company.toLowerCase().includes(q)); }
        if (sortOrder==="desc") res.sort((a,b)=>new Date(b.date)-new Date(a.date));
        else if (sortOrder==="asc") res.sort((a,b)=>new Date(a.date)-new Date(b.date));
        else res=[...res].reverse();
        return res;
      }, [jobs,selectedStatuses,sortOrder,searchQuery]);

      const successJobs = useMemo(() => {
        if (successFilter === "Last 30d") {
          const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
          return jobs.filter(j => j.date && new Date(j.date) >= cutoff);
        }
        return jobs;
      }, [jobs, successFilter]);

      const successStats = useMemo(() => ({
        rate: successJobs.length ? Math.round((successJobs.filter(j=>["Interview","Offer"].includes(j.status)).length / successJobs.length) * 100) : 0,
      }), [successJobs]);

      const cardFilteredJobs = useMemo(() => {
        if (cardFilter === "All") return jobs;
        if (cardFilter === "Interview") return jobs.filter(j => j.status === "Interview");
        if (cardFilter === "Reject") return jobs.filter(j => j.status === "Rejected");
        if (cardFilter === "Offer") return jobs.filter(j => j.status === "Offer");
        return jobs;
      }, [jobs, cardFilter]);

      const recentActivity = useMemo(() => {
        const events = [];
        jobs.forEach(j => {
          (j.history || []).forEach((h, i, arr) => {
            if (h.type === "note") {
              events.push({ title:j.title, company:j.company, type:"note", timestamp:h.timestamp, status:j.status });
            } else {
              const prevStatus = h.prevStatus || (i > 0 ? arr.slice(0,i).filter(x=>x.status).slice(-1)[0]?.status : null);
              events.push({ title:j.title, company:j.company, type:"status", status:h.status, prevStatus, timestamp:h.timestamp, isFirst:i===0&&!h.prevStatus });
            }
          });
        });
        events.sort((a,b) => {
          if (a.timestamp && b.timestamp) return new Date(b.timestamp) - new Date(a.timestamp);
          if (a.timestamp) return -1;
          if (b.timestamp) return 1;
          return 0;
        });
        return events.slice(0,5);
      }, [jobs]);

      const recentApplications = useMemo(() =>
        [...jobs].sort((a,b) => new Date(b.date||0) - new Date(a.date||0)).slice(0,5)
      , [jobs]);

      const pastCVs = [...new Set(jobs.map(j=>j.cv).filter(Boolean))];
      const cols = [{key:"title",label:"Position"},{key:"status",label:"Status"},{key:"cv",label:"CV Version"},{key:"company",label:"Company"},{key:"date",label:"Date"},{key:"notes",label:"Notes"}];

      return (
        <StatusContext.Provider value={{statuses:ctxStatuses,statusMeta:ctxStatusMeta,stageColors:ctxStageColors,statusConfig}}>
        <div className="app-root">
          <style>{styles}</style>


          {orphanAlert && (
            <OrphanAlertModal
              orphans={orphanAlert}
              statusConfig={statusConfig}
              onDismiss={()=>setOrphanAlert(null)}
              onConfirm={selections=>{
                save(jobs.map(j=>{
                  const newStatus = selections[j.id];
                  if (!newStatus) return j;
                  const history = j.history||[{status:j.status,timestamp:new Date().toISOString()}];
                  const last = history.filter(h=>h.status).slice(-1)[0]||history[history.length-1];
                  if (last.status===newStatus) return {...j,status:newStatus};
                  return {...j,status:newStatus,history:[...history,{status:newStatus,prevStatus:last.status,timestamp:new Date().toISOString()}]};
                }));
                setOrphanAlert(null);
              }}
            />
          )}
          {ctxMenu?.job && <ContextMenu job={ctxMenu.job} position={{x:ctxMenu.x,y:ctxMenu.y}} onEdit={startEdit} onDelete={deleteJob} onViewNote={setNoteJob} onViewTimeline={setTimelineJob} onClose={()=>setCtxMenu(null)}/>}
          {noteJob && <NoteOverlay job={noteJob} onClose={()=>setNoteJob(null)}/>}
          {timelineJob && <TimelineOverlay job={timelineJob} onClose={()=>setTimelineJob(null)} onSave={(id,hist)=>{
            save(jobs.map(j=>{
              if(j.id!==id) return j;
              const newStatus = hist.filter(h=>h.status).slice(-1)[0]?.status || j.status;
              return {...j, status:newStatus, history:hist};
            }));
            setTimelineJob(null);
          }}/>}

          {/* Header */}
          <div style={{background:"white",borderBottom:`1.5px solid ${C.border}`,position:"sticky",top:0,zIndex:100}}>
            <div style={{padding:isMobile?"0 12px":"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",height:52}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:32,height:32,background:C.ink,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",marginRight:isMobile?0:12,flexShrink:0}}>
                  <span style={{color:"white",fontSize:12,fontWeight:800,letterSpacing:"-0.05em"}}>JT</span>
                </div>
                {!isMobile && [["dashboard","Overview"],["list","Applications"],["cv","CV Stats"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setView(v)} className={`nav-tab ${view===v?"nav-tab-active":""}`}>{l}</button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {!isMobile && <span style={{fontSize:12,color:C.inkSoft,fontWeight:500}}>{stats.total} applications</span>}
                <button onClick={()=>setView("settings")} title="Settings"
                  style={{background:view==="settings"?C.indigoLight:"transparent",border:`1.5px solid ${view==="settings"?C.indigo:C.border}`,borderRadius:8,width:30,height:30,cursor:"pointer",color:view==="settings"?C.indigo:C.inkSoft,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}
                  onMouseEnter={e=>{if(view!=="settings"){e.currentTarget.style.background=C.bg;e.currentTarget.style.color=C.ink;}}}
                  onMouseLeave={e=>{if(view!=="settings"){e.currentTarget.style.background="transparent";e.currentTarget.style.color=C.inkSoft;}}}>
                  ⚙
                </button>
                <button className="btn-cta" style={{padding:isMobile?"8px 14px":"9px 22px",fontSize:isMobile?12:13}} onClick={()=>{setForm(EMPTY_FORM);setEditId(null);setAiText("");setView("add");}}>+ Add</button>
              </div>
            </div>
            {isMobile && (
              <div className="scrollbar-hide" style={{display:"flex",overflowX:"auto",borderTop:`1px solid ${C.border}`,padding:"0 4px"}}>
                {[["dashboard","Overview"],["list","Applications"],["cv","CV Stats"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setView(v)} className={`nav-tab ${view===v?"nav-tab-active":""}`} style={{whiteSpace:"nowrap",flex:"0 0 auto"}}>{l}</button>
                ))}
              </div>
            )}
          </div>

          <div className="resp-pad">

            {/* OVERVIEW */}
            {view==="dashboard" && (
              <div>
                <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:20}}>
                  <div>
                    <div style={{fontSize:isMobile?22:30,fontWeight:800,color:C.ink,letterSpacing:"-0.04em",lineHeight:1}}>Overview</div>
                    <div style={{fontSize:13,color:C.inkSoft,marginTop:4}}>Your job search at a glance</div>
                  </div>
                  {!isMobile && <button className="view-link" onClick={()=>setView("list")}>View All Applications</button>}
                </div>

                <div className="resp-grid-2">
                  <div className="card" style={{padding:24}}>
                    <div style={{display:"flex",flexDirection:isTablet?"column":"row",alignItems:isTablet?"flex-start":"center",justifyContent:"space-between",gap:isTablet?6:4,marginBottom:4}}>
                      <div style={{fontSize:12,color:C.inkSoft,fontWeight:500}}>Total applications</div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {["All","Interview","Reject","Offer"].map(t=>(
                          <button key={t} onClick={()=>setCardFilter(t)} className={`pill-selector${cardFilter===t?" pill-selector-active":""}`}>{t}</button>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      <span style={{fontSize:36,fontWeight:800,color:C.ink,letterSpacing:"-0.04em"}}>{cardFilteredJobs.length}</span>
                    </div>
                    <div style={{fontSize:12,color:C.inkSoft}}>
                      You have <span style={{color:C.indigo,fontWeight:700}}>{stats.interviewing} interview{stats.interviewing!==1?"s":""} active</span>.
                      {stats.offers > 0 && <span style={{color:C.teal,fontWeight:700}}> {stats.offers} offer{stats.offers>1?"s":""} received!</span>}
                    </div>
                    <ApplicationsChart jobs={cardFilteredJobs} />
                  </div>

                  <div className="card" style={{padding:24}}>
                    <div style={{display:"flex",flexDirection:isTablet?"column":"row",alignItems:isTablet?"flex-start":"center",justifyContent:"space-between",gap:isTablet?6:4,marginBottom:12}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.ink}}>Success Rate</div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {["All time","Last 30d"].map(t=>(
                          <button key={t} onClick={()=>setSuccessFilter(t)} className={`pill-selector${successFilter===t?" pill-selector-active":""}`}>{t}</button>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:4}}>
                      <span style={{fontSize:36,fontWeight:800,color:C.ink,letterSpacing:"-0.04em"}}>{successStats.rate}</span>
                      <span style={{fontSize:36,fontWeight:800,color:C.border,letterSpacing:"-0.04em"}}>%</span>
                    </div>
                    <div style={{fontSize:12,color:C.inkSoft,marginBottom:16}}>
                      {successFilter==="Last 30d" ? `Based on ${successJobs.length} applications in the last 30 days` : "Applications reaching screening or further"}
                    </div>
                    <div style={{display:"flex",gap:4,alignItems:"flex-end",height:52,marginTop:4}}>
                      {ctxStatuses.map(s => {
                        const count = successJobs.filter(j=>j.status===s).length;
                        const pct = successJobs.length ? (count/successJobs.length)*100 : 0;
                        const color = ctxStageColors[s] || C.inkSoft;
                        return (
                          <div key={s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                            <div style={{width:"100%",background:color,borderRadius:"4px 4px 0 0",height:`${Math.max(4,pct*0.48)}px`,transition:"height 0.5s",opacity:0.85}}/>
                            <div style={{fontSize:9,color:C.inkSoft,fontWeight:600,textAlign:"center",lineHeight:1.2}}>{count}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                      {ctxStatuses.map(s=>{
                        const color = ctxStageColors[s] || C.inkSoft;
                        return <div key={s} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:7,height:7,borderRadius:2,background:color}}/><span style={{fontSize:9,color:C.inkSoft}}>{s.split(" ")[0]}</span></div>;
                      })}
                    </div>
                  </div>
                </div>

                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                  <div style={{fontSize:isMobile?17:isTablet?19:22,fontWeight:800,color:C.ink,letterSpacing:"-0.03em"}}>Application Details</div>
                  {!isTablet && <button className="view-link" onClick={()=>setView("list")}>View More</button>}
                </div>

                <div className="resp-grid-3">
                  <StatCard label="Active Pipeline" value={stats.active} trend={stats.active > 0 ? `${stats.active} open` : null} idx={0}/>
                  <StatCard label="Interviewing" value={stats.interviewing} trend={stats.interviewing > 0 ? "In progress" : null} idx={1}/>
                  <StatCard label="Offers" value={stats.offers} trend={stats.offers > 0 ? "Congratulations!" : null} idx={2}/>
                </div>

                <div className="resp-grid-act">
                  <div className="card" style={{padding:0,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:isTablet?420:undefined}}>
                    <div style={{padding:"14px 18px 10px",borderBottom:`1.5px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
                      <span style={{fontSize:14,fontWeight:700,color:C.ink}}>Recent Activity</span>
                      <button onClick={()=>setActivityView(v=>v==="recent"?"activity":"recent")} className={`pill-selector${activityView==="recent"?" pill-selector-active":""}`}>Recent Application</button>
                    </div>
                    <div style={{padding:isTablet?"12px 18px":"0 18px",flex:1,display:"flex",flexDirection:"column"}}>
                      {activityView==="activity" ? (
                        recentActivity.length ? recentActivity.map((e,i)=>(
                          <div key={i} style={{flex:1,display:"flex",alignItems:"center",gap:12,borderBottom:i<recentActivity.length-1?`1px solid ${C.border}`:"none"}}>
                            <div style={{width:32,height:32,borderRadius:"50%",background:ctxStatusMeta[e.status]?.bg||C.bg,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                              <div style={{width:10,height:10,borderRadius:"50%",background:ctxStatusMeta[e.status]?.dot||C.inkSoft}}/>
                            </div>
                            <div style={{minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:700,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>
                              <div style={{fontSize:11,color:C.inkSoft,marginTop:1}}>
                                {e.type==="note"
                                  ? `${e.company} — Added a note`
                                  : e.isFirst
                                    ? `${e.company} — Application submitted`
                                    : `${e.company} — Status changed from ${e.prevStatus} to ${e.status}`
                                }
                              </div>
                            </div>
                          </div>
                        )) : <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.inkSoft,fontSize:13}}>No activity yet</div>
                      ) : (
                        recentApplications.length ? recentApplications.map((j,i)=>(
                          <div key={j.id} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,borderBottom:i<recentApplications.length-1?`1px solid ${C.border}`:"none"}}>
                            <div style={{minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:700,color:C.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{j.title}</div>
                              <div style={{fontSize:11,color:C.inkSoft,marginTop:1}}>{j.company} · {j.date||"—"}</div>
                            </div>
                            <StatusBadge status={j.status} onSelect={s=>updateStatus(j.id,s)}/>
                          </div>
                        )) : <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:C.inkSoft,fontSize:13}}>No applications yet</div>
                      )}
                    </div>
                  </div>

                  <div className="card" style={{padding:20}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.ink}}>Application Funnel</div>
                      <button className="view-link" onClick={()=>setView("funnel")}>View Full</button>
                    </div>
                    <SankeyDiagram jobs={jobs} compact={true}/>
                  </div>
                </div>
              </div>
            )}

            {/* APPLICATIONS */}
            {view==="list" && (
              <div>
                <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:20}}>
                  <div>
                    <div style={{fontSize:isMobile?22:30,fontWeight:800,color:C.ink,letterSpacing:"-0.04em",lineHeight:1}}>Applications</div>
                    <div style={{fontSize:13,color:C.inkSoft,marginTop:4}}>{filtered.length} of {jobs.length} shown</div>
                  </div>
                </div>

                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flex:1,flexWrap:"wrap"}}>
                    <div style={{position:"relative",maxWidth:240,flex:1}}>
                      <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:13,color:C.inkSoft}}>🔍</span>
                      <input type="text" placeholder="Search position or company…" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                        style={{paddingLeft:34,width:"100%",border:`1.5px solid ${C.border}`,borderRadius:20,padding:"8px 16px 8px 34px",fontSize:12,color:C.ink,background:"white",outline:"none",fontFamily:"inherit"}}/>
                      {searchQuery && <button onClick={()=>setSearchQuery("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:C.inkSoft,cursor:"pointer",fontSize:13}}>✕</button>}
                    </div>
                    <button onClick={()=>setShowFilters(o=>!o)} className={`filter-pill ${showFilters?"filter-pill-active":""}`} style={{display:"flex",alignItems:"center",gap:5}}>
                      ⚙ Filter {activeFilterCount>0&&<span style={{background:showFilters?C.indigo:C.indigoLight,color:showFilters?"white":C.indigo,borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>{activeFilterCount}</span>}
                    </button>
                    {activeFilterCount>0 && <button onClick={resetFilters} style={{background:"transparent",border:"none",fontSize:11,color:C.inkSoft,cursor:"pointer"}}>Clear</button>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {!isMobile && <button onClick={()=>setColWidths(DEFAULT_COL_WIDTHS)} style={{background:"transparent",border:"none",fontSize:11,color:C.inkSoft,cursor:"pointer"}}>Reset columns</button>}
                    <button onClick={exportToExcel} className="filter-pill" style={{display:"flex",alignItems:"center",gap:5,fontWeight:600}}>⬇ Export</button>
                  </div>
                </div>

                {showFilters && (
                  <div className="card" style={{padding:16,marginBottom:12,display:"flex",flexWrap:"wrap",gap:20}}>
                    <div style={{flex:1,minWidth:200}}>
                      <p style={{fontSize:10,fontWeight:700,color:C.inkSoft,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Status</p>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        <button onClick={()=>setSelectedStatuses([])} className={`filter-pill ${selectedStatuses.length===0?"filter-pill-active":""}`}>All</button>
                        {ctxStatuses.map(s=><button key={s} onClick={()=>toggleStatus(s)} className={`filter-pill ${selectedStatuses.includes(s)?"filter-pill-active":""}`}>{s}</button>)}
                      </div>
                    </div>
                    <div>
                      <p style={{fontSize:10,fontWeight:700,color:C.inkSoft,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Sort</p>
                      <div style={{display:"flex",gap:5}}>
                        {[["desc","Most Recent"],["asc","Oldest First"]].map(([val,lbl])=>(
                          <button key={val} onClick={()=>setSortOrder(v=>v===val?"none":val)} className={`filter-pill ${sortOrder===val?"filter-pill-active":""}`}>{lbl}</button>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {!filtered.length
                  ? <p style={{fontSize:13,color:C.inkSoft,textAlign:"center",padding:"48px 0"}}>No applications found</p>
                  : isMobile ? (
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {filtered.map(j=>(
                        <div key={j.id} className="card" style={{padding:14}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:10}}>
                            <div style={{minWidth:0,flex:1}}>
                              <div style={{fontWeight:700,color:C.ink,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{j.title}</div>
                              <div style={{fontSize:12,color:C.inkMid}}>{j.company}{j.date?` · ${j.date}`:""}</div>
                            </div>
                            <button onClick={e=>{e.stopPropagation();setCtxMenu({job:j,x:e.clientX,y:e.clientY});}}
                              style={{background:"transparent",border:`1.5px solid ${C.border}`,borderRadius:8,width:28,height:28,cursor:"pointer",color:C.inkSoft,fontSize:16,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",letterSpacing:2}}>
                              ···
                            </button>
                          </div>
                          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexWrap:"wrap"}}>
                            <StatusBadge status={j.status} onSelect={s=>updateStatus(j.id,s)}/>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              {j.cv && <span style={{fontSize:10,padding:"2px 8px",background:C.lavLight,color:"#5A2D8A",borderRadius:20,fontWeight:700,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"inline-block"}}>{j.cv}</span>}
                              {j.notes && <button onClick={()=>setNoteJob(j)} style={{fontSize:11,color:C.indigo,background:"transparent",border:"none",cursor:"pointer",fontWeight:700,padding:0,textDecoration:"underline",textUnderlineOffset:2}}>Note</button>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="card" style={{overflow:"hidden"}}>
                      <div className="scrollbar-hide" style={{maxHeight:460,overflowY:"auto",overflowX:"hidden"}}>
                        <table style={{borderCollapse:"collapse",width:"100%",tableLayout:"fixed"}}>
                          <thead style={{position:"sticky",top:0,zIndex:10}}>
                            <tr>{cols.map(c=><ResizableHeader key={c.key} label={c.label} colKey={c.key} widths={colWidths} onResize={setCol}/>)}</tr>
                          </thead>
                          <tbody>
                            {filtered.map(j=>(
                              <tr key={j.id} className="trow" style={{borderBottom:`1px solid ${C.border}`}}>
                                <td style={{padding:"12px 14px",fontWeight:700,color:C.ink,fontSize:13,cursor:"context-menu",overflow:"hidden"}}
                                  onContextMenu={e=>{e.preventDefault();e.stopPropagation();setCtxMenu({job:j,x:e.clientX,y:e.clientY});}}>
                                  <span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={j.title}>{j.title}</span>
                                </td>
                                <td style={{padding:"12px 14px",overflow:"hidden"}}><StatusBadge status={j.status} onSelect={s=>updateStatus(j.id,s)}/></td>
                                <td style={{padding:"12px 14px",overflow:"hidden"}}>
                                  {j.cv?<span style={{fontSize:11,padding:"3px 10px",background:C.lavLight,color:"#5A2D8A",borderRadius:20,fontWeight:700,display:"inline-block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%"}}>{j.cv}</span>:<span style={{color:C.border}}>—</span>}
                                </td>
                                <td style={{padding:"12px 14px",color:C.inkMid,fontSize:12,fontWeight:500,overflow:"hidden"}}><span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{j.company}</span></td>
                                <td style={{padding:"12px 14px",color:C.inkSoft,fontSize:12,overflow:"hidden",whiteSpace:"nowrap"}}>{j.date}</td>
                                <td style={{padding:"12px 14px",overflow:"hidden"}}>
                                  {j.notes?<button onClick={()=>setNoteJob(j)} style={{fontSize:11,color:C.indigo,background:"transparent",border:"none",cursor:"pointer",fontWeight:700,padding:0,textDecoration:"underline",textUnderlineOffset:2}}>View note</button>:<span style={{color:C.border}}>—</span>}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}
                {!isMobile && <p style={{fontSize:10,color:C.border,marginTop:6,textAlign:"right"}}>Drag column edges to resize · Right-click a job title for actions</p>}
              </div>
            )}

            {/* CV STATS */}
            {view==="cv" && (
              <div>
                <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:20}}>
                  <div>
                    <div style={{fontSize:isMobile?22:30,fontWeight:800,color:C.ink,letterSpacing:"-0.04em",lineHeight:1}}>CV Stats</div>
                    <div style={{fontSize:13,color:C.inkSoft,marginTop:4}}>See which CV version performs best</div>
                  </div>
                </div>
                <CVStatsView cvStats={cvStatsData()}/>
              </div>
            )}

            {/* FULL FUNNEL */}
            {view==="funnel" && (
              <div>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
                  <div>
                    <button onClick={()=>setView("dashboard")} style={{background:"transparent",border:"none",fontSize:12,color:C.inkSoft,cursor:"pointer",padding:"0 0 8px 0",display:"flex",alignItems:"center",gap:4,fontFamily:"inherit",fontWeight:500}}>
                      ← Overview
                    </button>
                    <div style={{fontSize:20,fontWeight:800,color:C.ink,letterSpacing:"-0.04em",lineHeight:1}}>Application Funnel</div>
                    <div style={{fontSize:13,color:C.inkSoft,marginTop:4}}>Full breakdown of your application pipeline</div>
                  </div>
                </div>

                {/* Full Sankey */}
                <div className="card" style={{padding:24,marginBottom:20}}>
                  <SankeyDiagram jobs={jobs} compact={false}/>
                </div>

                {/* Per-status breakdown */}
                <div className="card" style={{padding:24}}>
                  <div style={{fontSize:16,fontWeight:800,color:C.ink,letterSpacing:"-0.02em",marginBottom:16}}>Pipeline Breakdown</div>
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    {ctxStatuses.map(s => {
                      const count = jobs.filter(j=>j.status===s).length;
                      const pct = jobs.length ? Math.round((count/jobs.length)*100) : 0;
                      const meta = ctxStatusMeta[s] || {bg:C.bg,text:C.inkMid,dot:C.inkSoft};
                      return (
                        <div key={s} style={{display:"flex",alignItems:"center",gap:12}}>
                          <div style={{width:9,height:9,borderRadius:"50%",background:meta.dot,flexShrink:0}}/>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                              <span style={{fontSize:13,fontWeight:600,color:C.ink}}>{s}</span>
                              <span style={{fontSize:13,fontWeight:700,color:meta.dot}}>{count} <span style={{fontSize:11,fontWeight:500,color:C.inkSoft}}>({pct}%)</span></span>
                            </div>
                            <div className="prog-track" style={{height:6}}>
                              <div className="prog-fill" style={{height:"100%",background:meta.dot,width:`${pct}%`}}/>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <p style={{fontSize:11,color:C.border,marginTop:16,marginBottom:0}}>Based on current status of all {jobs.length} applications</p>
                </div>
              </div>
            )}

            {/* ADD / EDIT */}
            {view==="add" && (
              <div>
                <div style={{marginBottom:24}}>
                  <div style={{fontSize:isMobile?22:30,fontWeight:800,color:C.ink,letterSpacing:"-0.04em",lineHeight:1}}>{editId?"Edit Application":"New Application"}</div>
                  <div style={{fontSize:13,color:C.inkSoft,marginTop:4}}>{editId?"Update the details below":"Fill in the job details"}</div>
                </div>
                <div className="card" style={{padding:isMobile?16:28,maxWidth:isMobile?"100%":520}}>
                  {!editId && (
                    <div style={{display:"flex",gap:6,marginBottom:20}}>
                      {[["manual","✍️ Manual"],["ai","🤖 AI Auto-fill"]].map(([m,l])=>(
                        <button key={m} onClick={()=>setAddMode(m)} className={`pill-selector ${addMode===m?"pill-selector-active":""}`} style={{flex:1,padding:"9px 14px",borderRadius:10,fontSize:13}}>{l}</button>
                      ))}
                    </div>
                  )}
                  {addMode==="ai" && !editId && (
                    <div style={{marginBottom:20}}>
                      <div style={{marginBottom:14}}>
                        <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Anthropic API Key</label>
                        <input type="password" placeholder="sk-ant-..." value={apiKey}
                          onChange={e=>{setApiKey(e.target.value);localStorage.setItem("apiKey",e.target.value);}}
                          className="app-input"/>
                        <p style={{fontSize:11,color:C.inkSoft,marginTop:5}}>Saved locally in your browser only.</p>
                      </div>
                      <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Paste job email or description</label>
                      <textarea className="app-input" style={{height:110,resize:"none",display:"block",lineHeight:1.6}}
                        placeholder="Paste the job posting, email, or any text here…" value={aiText} onChange={e=>setAiText(e.target.value)}/>
                      <button className="btn-cta" style={{width:"100%",marginTop:8,borderRadius:10}} onClick={handleAiAutoFill} disabled={aiLoading}>
                        {aiLoading?"Extracting…":"Auto-fill Fields →"}
                      </button>
                    </div>
                  )}
                  {(addMode==="manual"||editId) && (
                    <div style={{display:"flex",flexDirection:"column",gap:14}}>
                      {[["title","Job Title","e.g. Frontend Engineer"],["company","Company","e.g. Acme Corp"],["date","Date Applied",""],["url","Job URL (optional)","https://…"]].map(([k,l,p])=>(
                        <div key={k}>
                          <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</label>
                          <input type={k==="date"?"date":"text"} placeholder={p} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} className="app-input"/>
                        </div>
                      ))}
                      <div>
                        <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>CV Version</label>
                        <CVInput value={form.cv} onChange={v=>setForm({...form,cv:v})} pastCVs={pastCVs}/>
                      </div>
                      <div>
                        <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Status</label>
                        <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})} className="app-input">
                          {ctxStatuses.map(s=><option key={s}>{s}</option>)}
                        </select>
                      </div>
                      <div>
                        <label style={{fontSize:10,fontWeight:700,color:C.inkSoft,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>Notes</label>
                        <textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Any notes…"
                          className="app-input" style={{height:80,resize:"none",display:"block",lineHeight:1.6}}/>
                      </div>
                      <div style={{display:"flex",gap:8,paddingTop:4}}>
                        <button className="btn-cta" style={{flex:1,borderRadius:10}} onClick={submitForm}>{editId?"Save Changes":"Add Application"}</button>
                        <button className="btn-outline" style={{padding:"9px 20px"}} onClick={()=>{setView("list");setEditId(null);setForm(EMPTY_FORM);}}>Cancel</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
            {/* SETTINGS */}
            {view==="settings" && (
              <SettingsPage
                statusConfig={statusConfig} saveStatusConfig={saveStatusConfig}
                themeName={themeName} themeMode={themeMode} changeTheme={changeTheme}
                isMobile={isMobile}
                settingsSection={settingsSection} setSettingsSection={setSettingsSection}
                jobs={jobs} onExportCSV={exportCSV} onExportExcel={exportToExcel} onCSVFile={handleCSVFile}
                importPreview={importPreview} setImportPreview={setImportPreview}
                importMode={importMode} setImportMode={setImportMode}
                importReplaceText={importReplaceText} setImportReplaceText={setImportReplaceText}
                onConfirmImport={confirmImport} resetText={resetText} setResetText={setResetText} onReset={resetAllData}
                supportForm={supportForm} setSupportForm={setSupportForm}
                supportSubmitted={supportSubmitted} setSupportSubmitted={setSupportSubmitted}
                supportDirty={supportDirty} setSupportDirty={setSupportDirty}
              />
            )}
          </div>
        </div>
        </StatusContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
